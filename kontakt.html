<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="shortcut icon" href="./img/szary-plomien.png" type="image/x-icon">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <header class="p-3 d-flex justify-content-between align-items-center text-white">
        <img src="./img/banner2.png" alt="" class="bg">
        <div class="dim"></div>
        <div class="logo content"><img src="./img/auto.png" alt="" width="70" height="70"></div>
        <h1 class="m-0 textshade content">Skontaktuj się</h1>
        <nav class="content">
            <ul class="nav">
                <li class="nav-item"><a class="nav-link text-white fw-bold navlink me-1 mb-1" href="index.html">Główna</a></li>
                <li class="nav-item"><a class="nav-link text-white fw-bold navlink me-1 mb-1" href="hw.html">Co to HW?</a></li>
                <li class="nav-item"><a class="nav-link text-white fw-bold navlink me-1 mb-1" href="poradnik.html">Poradnik</a></li>
                <li class="nav-item"><a class="nav-link text-white fw-bold navlink me-1 mb-1" href="galeria.html">Galeria</a></li>
                <li class="nav-item"><a class="nav-link text-white fw-bold navlink me-1 mb-1" href="kolekcja.html">Kolekcja</a></li>
                <li class="nav-item"><a class="nav-link text-white fw-bold navlink me-1 mb-1" href="ulubione.html">Ulubione</a></li>
                <li class="nav-item"><a class="nav-link text-white fw-bold navlink me-1 mb-1" href="faq.html">FAQ</a></li>
                <li class="nav-item"><a class="nav-link text-white fw-bold navlink mb-1" href="kontakt.html">Kontakt</a></li>
            </ul>
        </nav>
    </header>

    <main class="flex-grow-1 container p-4 my-4 bg-white border border-dark rounded">
        <h2 class="border-bottom border-dark pb-2 mb-4">Formularz kontaktowy</h2>
        <form id="kontaktFormularz">
            <div class="mb-3">
                <label for="imie" class="form-label fw-bold">Imię (wymagane)</label>
                <input type="text" class="form-control border-dark" id="imie" required pattern="[A-Za-zĄĆĘŁŃÓŚŹŻąćęłńóśźż\-]+" minlength="2">
            </div>
            <div class="mb-3">
                <label for="nazwisko" class="form-label fw-bold">Nazwisko (wymagane)</label>
                <input type="text" class="form-control border-dark" id="nazwisko" required pattern="[A-Za-zĄĆĘŁŃÓŚŹŻąćęłńóśźż\-]+" minlength="2">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label fw-bold">E-mail (wymagane)</label>
                <input type="email" class="form-control border-dark" id="email" required>
            </div>
            <div class="mb-3">
                <label for="telefon" class="form-label fw-bold">Telefon (opcjonalne)</label>
                <input type="tel" class="form-control border-dark" id="telefon" pattern="[0-9\s\+]{9,15}">
            </div>
            <div class="mb-3">
                <label for="temat" class="form-label fw-bold">Temat (wymagane)</label>
                <input type="text" class="form-control border-dark" id="temat" required minlength="5" maxlength="50">
            </div>
            <div class="mb-3">
                <label for="wiadomosc" class="form-label fw-bold">Wiadomość (wymagane)</label>
                <textarea class="form-control border-dark" id="wiadomosc" rows="5" required minlength="10" maxlength="500"></textarea>
            </div>
            <button type="submit" class="btn btn-dark fw-bold px-4 py-2">Wyślij</button>
        </form>
    </main>

    <footer class="bg-dark text-white text-center p-3 mt-auto w-100">
        <p class="m-0">Dziennik Hot Wheelsów &copy; 2026</p>
    </footer>

    <script>
        document.getElementById('kontaktFormularz').addEventListener('submit', function(event) {
            event.preventDefault();
            sessionStorage.setItem('imie', document.getElementById('imie').value);
            sessionStorage.setItem('nazwisko', document.getElementById('nazwisko').value);
            sessionStorage.setItem('email', document.getElementById('email').value);
            sessionStorage.setItem('telefon', document.getElementById('telefon').value);
            sessionStorage.setItem('temat', document.getElementById('temat').value);
            sessionStorage.setItem('wiadomosc', document.getElementById('wiadomosc').value);
            window.location.href = 'podsumowanie.html';
        });
    </script>
</body>
</html>
